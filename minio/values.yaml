# Default values for MinIO Helm chart
# ref: https://min.io/docs/minio/kubernetes/upstream/

# ─── Image ────────────────────────────────────────────────────────
image:
  registry: quay.io
  repository: minio/minio
  tag: "RELEASE.2025-09-07T16-13-09Z"
  pullPolicy: IfNotPresent
  pullSecrets: []

# ─── Authentication ──────────────────────────────────────────────
auth:
  ## @param auth.rootUser MinIO root (admin) username
  rootUser: "minioadmin"
  ## @param auth.rootPassword MinIO root password (auto-generated if empty)
  rootPassword: ""
  ## @param auth.existingSecret Name of existing secret with credentials
  ## Keys expected: root-user, root-password
  existingSecret: ""

# ─── Deployment Mode ─────────────────────────────────────────────
## @param mode MinIO deployment mode: standalone or distributed
## standalone: single-replica, single-drive
## distributed: multi-replica erasure coding (requires replicas >= 4)
mode: standalone

## @param replicaCount Number of MinIO replicas (must be 1 for standalone, >= 4 for distributed)
replicaCount: 1

## @param drivesPerNode Number of drives (PVCs) per MinIO node (distributed mode only)
drivesPerNode: 1

## @param zones Number of server pools (distributed mode only)
zones: 1

# ─── Service ─────────────────────────────────────────────────────
service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001
  annotations: {}
  ## @param service.loadBalancerIP Static IP for LoadBalancer type
  loadBalancerIP: ""

# ─── Ingress (API) ──────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: minio.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []

# ─── Ingress (Console) ──────────────────────────────────────────
consoleIngress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: console.minio.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []

# ─── Resources ───────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ─── Persistence ─────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}
  ## @param persistence.existingClaim Use an existing PVC (standalone mode only)
  existingClaim: ""

# ─── Security Context ───────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Console ─────────────────────────────────────────────────────
## @param console.enabled Enable the MinIO browser console on port 9001
console:
  enabled: true

# ─── Probes ──────────────────────────────────────────────────────
livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# ─── Init Buckets ────────────────────────────────────────────────
initBuckets:
  ## @param initBuckets.enabled Create default buckets after MinIO starts
  enabled: false
  ## @param initBuckets.buckets List of bucket names to create
  buckets: []
  #  - my-bucket
  ## @param initBuckets.useHelmHooks Use Helm hooks for the bucket init Job
  ## Set to false when using ArgoCD
  useHelmHooks: true
  ## @param initBuckets.cleanupAfterFinished Auto-delete the Job after completion
  cleanupAfterFinished:
    enabled: false
    seconds: 600
  ## @param initBuckets.annotations Additional annotations for the Job
  annotations: {}
  ## @param initBuckets.image MinIO Client image for bucket init
  image:
    registry: quay.io
    repository: minio/mc
    tag: "RELEASE.2025-08-13T08-35-41Z"
    pullPolicy: IfNotPresent

# ─── Network Policy ──────────────────────────────────────────────
networkPolicy:
  ## @param networkPolicy.enabled Enable NetworkPolicy
  enabled: true
  ## @param networkPolicy.allowExternal Allow all external ingress to API/console ports
  allowExternal: true

# ─── Pod Disruption Budget ───────────────────────────────────────
pdb:
  ## @param pdb.create Create a PodDisruptionBudget
  create: false
  ## @param pdb.minAvailable Minimum available pods
  minAvailable: ""
  ## @param pdb.maxUnavailable Maximum unavailable pods
  maxUnavailable: 1

# ─── Extra ───────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

extraEnvVars: []
extraArgs: []
extraVolumes: []
extraVolumeMounts: []

## @param environment Additional environment variables as a map
## ref: https://min.io/docs/minio/linux/reference/minio-server/minio-server.html#envvar
environment: {}
  # MINIO_BROWSER: "off"
  # MINIO_DOMAIN: "minio.example.com"
