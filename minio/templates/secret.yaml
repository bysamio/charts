{{- if not .Values.auth.existingSecret }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "minio.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
data:
  root-user: {{ .Values.auth.rootUser | b64enc | quote }}
  {{- if and (not .Values.auth.rootPassword) $existingSecret }}
  root-password: {{ index $existingSecret.data "root-password" }}
  {{- else }}
  root-password: {{ .Values.auth.rootPassword | default (randAlphaNum 24) | b64enc | quote }}
  {{- end }}
{{- end }}
