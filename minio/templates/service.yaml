## Main service (ClusterIP/LoadBalancer) for API and console
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  ports:
    - name: api
      port: {{ .Values.service.ports.api }}
      targetPort: api
      protocol: TCP
    {{- if .Values.console.enabled }}
    - name: console
      port: {{ .Values.service.ports.console }}
      targetPort: console
      protocol: TCP
    {{- end }}
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
---
## Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.headlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: api
      port: {{ .Values.service.ports.api }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
