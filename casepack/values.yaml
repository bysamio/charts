# CasePack Umbrella Helm Chart — Default Values
# Deploys the full CasePack stack: API, SPA, PostgreSQL, Keycloak, SeaweedFS
#
# Override per-subchart using the subchart key prefix:
#   casepack-api.config.corsOrigins: "https://casepack.example.com"
#   postgresql.auth.password: "changeme"
#
# For production, disable bundled infra and point to external services:
#   postgresql.enabled: false
#   keycloak.enabled: false
#   seaweedfs.enabled: false

# ─── Global ──────────────────────────────────────────────────────
global:
  # Domain base — used to derive defaults for subcharts
  domain: "casepack.example.com"
  # StorageClass for all PVCs (leave empty to use cluster default)
  storageClass: ""

# ═══════════════════════════════════════════════════════════════
#  CasePack API
# ═══════════════════════════════════════════════════════════════
casepack-api:
  replicaCount: 1

  image:
    repository: ghcr.io/bysamio/casepack-api
    tag: ""
    pullPolicy: IfNotPresent

  config:
    serverPort: "8080"
    forwardHeadersStrategy: "NATIVE"
    oidcIssuerUri: "http://casepack-keycloak/realms/casepack"
    oidcJwkSetUri: ""
    s3Endpoint: "http://casepack-seaweedfs-s3:8333"
    # Optional browser-facing endpoint used for presigned upload/download URLs.
    # When blank, the API signs URLs with s3Endpoint.
    # For Kubernetes installs that use existingSecret, also include
    # S3_PUBLIC_ENDPOINT in that Secret.
    s3PublicEndpoint: ""
    s3Region: "us-east-1"
    s3Bucket: "casepack"
    s3PathStyle: "true"
    s3PresignExpiry: "900"
    s3AutoCreateBucket: "true"
    s3BucketPerTenant: "false"
    evidenceMaxBytes: "104857600"
    evidenceAllowedTypes: ""
    rateLimitEnabled: "true"
    rateLimitInit: "30"
    rateLimitFinalize: "30"
    rateLimitGlobal: "300"
    rateLimitWebhookIntake: "60"
    exportMaxItems: "100"
    exportMaxBytes: "536870912"
    exportPoolSize: "2"
    webhookEnabled: "true"
    webhookMaxPayload: "1048576"
    timelineEnabled: "true"
    corsOrigins: "http://localhost:3000"
    deploymentMode: "self_host"
    installationId: ""
    licenseKeySource: "jwks"
    licenseJwksUrl: "https://licensing.bysam.io/.well-known/jwks.json"
    licensingBaseUrl: "https://licensing.bysam.io"
    activationFile: "/run/secrets/activation.json"
    selfHostBootstrapEnabled: "true"
    selfHostBootstrapTenantName: "CasePack Workspace"
    selfHostBootstrapAdminEmail: ""
    selfHostBootstrapAdminInitialPassword: ""
    keycloakBaseUrl: "http://casepack-keycloak"
    keycloakRealm: "casepack"
    keycloakSpaClientId: "casepack-spa"
    keycloakSpaRedirectUri: "http://localhost:3000/auth/callback"
    javaOpts: "-Xms256m -Xmx512m"

  secrets:
    existingSecret: ""
    dbUrl: "jdbc:postgresql://casepack-postgresql-primary:5432/casepack"
    dbUser: "casepack"
    dbPass: "casepack"                 # Override in production!
    s3AccessKey: "admin"
    s3SecretKey: "admin123456"
    # Inline license JWT exposed to the API as CASEPACK_LICENSE_TOKEN.
    licenseToken: ""
    licensePublicKey: ""
    # Helper values for wrapper-owned Kubernetes Secrets. The recommended
    # production path is an existingSecret containing the API runtime env vars.
    licenseTokenFile: ""
    activationBundle: ""
    keycloakSaClientId: "casepack-user-manager"
    keycloakSaClientSecret: "casepack-user-manager-secret"

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: api.casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi

# ═══════════════════════════════════════════════════════════════
#  CasePack SPA
# ═══════════════════════════════════════════════════════════════
casepack-spa:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/bysamio/casepack-spa
    tag: ""
    pullPolicy: IfNotPresent
  config:
    apiBaseUrl: "http://localhost:8080"
    oidcAuthority: "http://localhost:8081/realms/casepack"
    oidcClientId: "casepack-spa"
    deploymentMode: "SELF_HOST"
    licensingPortalUrl: "https://licensing.bysam.io/portal"
  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ═══════════════════════════════════════════════════════════════
#  PostgreSQL (BySamio)
# ═══════════════════════════════════════════════════════════════
postgresql:
  enabled: true
  auth:
    database: casepack
    username: casepack
    password: casepack             # Override in production!
    postgresPassword: postgres     # Override in production!
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ═══════════════════════════════════════════════════════════════
#  Keycloak (BySamio chart)
# ═══════════════════════════════════════════════════════════════
keycloak:
  enabled: true
  image:
    tag: 26.6.3-optimized
  production: false
  httpEnabled: true
  auth:
    adminUser: admin
    adminPassword: admin           # Override in production!
  # Use the parent PostgreSQL chart for the bundled stack. The Keycloak
  # subchart also ships a PostgreSQL dependency; keep it disabled here so
  # the umbrella chart has one database service to operate.
  postgresql:
    enabled: false
  externalDatabase:
    host: casepack-postgresql-primary
    port: 5432
    database: keycloak
    user: keycloak
    password: keycloak             # Override in production!
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1024Mi
  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: auth.casepack.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ═══════════════════════════════════════════════════════════════
#  SeaweedFS (S3-compatible storage)
# ═══════════════════════════════════════════════════════════════
seaweedfs:
  enabled: true
  image:
    repository: chrislusf/seaweedfs
    tag: latest
  s3:
    enabled: true
    port: 8333
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
