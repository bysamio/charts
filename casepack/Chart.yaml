apiVersion: v2
name: casepack
description: >-
  CasePack — multi-tenant incident evidence management platform for MSPs.
  Deploys the full stack in one command.
type: application
version: 0.1.0
appVersion: "0.3.1"
home: https://casepack.app
icon: https://casepack.app/apple-touch-icon.png
sources:
  - https://github.com/bysamio/casepack
keywords:
  - casepack
  - incident-management
  - evidence
  - nis2
  - msp
  - multi-tenant
  - keycloak
  - seaweedfs
  - self-host
maintainers:
  - name: bysamio
    url: https://github.com/bysamio
annotations:
  artifacthub.io/license: Proprietary
  artifacthub.io/category: security

dependencies:
  # ── Core Application ───────────────────────────────────────────
  - name: casepack-api
    version: "0.19.0"
    repository: "oci://ghcr.io/bysamio/charts"

  - name: casepack-spa
    version: "0.18.0"
    repository: "oci://ghcr.io/bysamio/charts"
    condition: casepack-spa.enabled

  # ── Infrastructure (optional — disable if using external services) ─
  - name: postgresql
    version: "2.3.1"
    repository: "oci://ghcr.io/bysamio/charts"
    condition: postgresql.enabled

  - name: keycloak
    version: "1.2.4"
    repository: "oci://ghcr.io/bysamio/charts"
    condition: keycloak.enabled

  - name: seaweedfs
    version: "4.34.0"
    repository: "https://seaweedfs.github.io/seaweedfs/helm"
    condition: seaweedfs.enabled
