name: Release Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - 'wordpress/**'
      - 'mariadb/**'
      - 'memcached/**'
      - 'keycloak/**'
      - 'postgresql/**'
      - 'minio/**'
      - 'casepack-api/**'
      - 'casepack-spa/**'
      - 'casepack-docs/**'
      - 'casepack/**'
      - 'artifacthub-repo.yml'
      - 'README.md'
      - 'scripts/**'
      - '.github/workflows/release-charts.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Login to GHCR (OCI)
        # GHCR_PAT is a classic PAT (write:packages, read:packages) owned by the
        # repo owner. Required to create *new* packages under a user namespace,
        # which the default GITHUB_TOKEN cannot do. Falls back to GITHUB_TOKEN
        # for pushing new versions of already-linked packages.
        run: echo "${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Add Helm repositories
        run: |
          helm repo add seaweedfs https://seaweedfs.github.io/seaweedfs/helm
          helm repo update

      - name: Update chart dependencies
        run: |
          set -euo pipefail
          charts=(mariadb memcached wordpress keycloak postgresql minio casepack-api casepack-spa casepack-docs casepack)
          for chart in "${charts[@]}"; do
            if [ -f "${chart}/Chart.yaml" ]; then
              helm dependency build "${chart}"
            fi
          done

      - name: Lint Helm charts
        run: |
          set -euo pipefail
          for chart in mariadb memcached wordpress keycloak postgresql minio casepack-api casepack-spa casepack-docs casepack; do
            helm lint "$chart"
          done

      - name: Check and create gh-pages branch
        run: |
          if ! git ls-remote --heads origin gh-pages | grep gh-pages; then
            echo "gh-pages branch does not exist. Creating it..."
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
          else
            echo "gh-pages branch already exists."
          fi

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: .
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to OCI registry
        run: |
          set -euo pipefail
          # Find the packaged charts from chart-releaser
          if [ -d ".cr-release-packages" ]; then
            for package in .cr-release-packages/*.tgz; do
              if [ -f "$package" ]; then
                echo "Pushing $package to OCI registry..."
                helm push "$package" oci://ghcr.io/${{ github.repository_owner }}/charts
              fi
            done
          else
            echo "No packaged charts found. Packaging now..."
            for chart in mariadb memcached wordpress keycloak postgresql minio casepack-api casepack-spa casepack-docs casepack; do
              package=$(helm package "$chart" | grep -oP '(?<=to: ).*')
              echo "Pushing $package to OCI registry..."
              helm push "$package" oci://ghcr.io/${{ github.repository_owner }}/charts
            done
          fi

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update gh-pages site (landing page + artifacthub-repo.yml)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml

          # artifacthub metadata
          [ -f artifacthub-repo.yml ] && cp artifacthub-repo.yml gh-pages-dir/

          # Regenerate the landing page from the freshly published index.yaml so
          # it always matches the charts that are actually in the repository.
          if [ -f gh-pages-dir/index.yaml ]; then
            python3 scripts/generate-index-html.py gh-pages-dir/index.yaml gh-pages-dir/index.html
          else
            echo "::warning::gh-pages-dir/index.yaml not found; skipping index.html generation"
          fi

          cd gh-pages-dir
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Regenerate landing page and artifacthub-repo.yml"
          git push
