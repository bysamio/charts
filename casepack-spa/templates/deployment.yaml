apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "casepack-spa.fullname" . }}
  labels:
    {{- include "casepack-spa.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "casepack-spa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "casepack-spa.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "casepack-spa.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CASEPACK_API_BASE_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
            - name: CASEPACK_OIDC_AUTHORITY
              value: {{ .Values.config.oidcAuthority | quote }}
            - name: CASEPACK_OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientId | quote }}
            - name: CASEPACK_LICENSING_PORTAL_URL
              value: {{ .Values.config.licensingPortalUrl | quote }}
            - name: CASEPACK_DEPLOYMENT_MODE
              value: {{ .Values.config.deploymentMode | quote }}
            - name: CASEPACK_APP_VERSION
              value: {{ .Values.config.appVersion | quote }}
            - name: CASEPACK_DOCS_BASE_URL
              value: {{ .Values.config.docsBaseUrl | quote }}
            - name: CASEPACK_UMAMI_SCRIPT_URL
              value: {{ .Values.config.umamiScriptUrl | quote }}
            - name: CASEPACK_UMAMI_WEBSITE_ID
              value: {{ .Values.config.umamiWebsiteId | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "casepack-spa.fullname" . }}-nginx
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
